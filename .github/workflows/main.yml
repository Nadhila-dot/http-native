name: Benchmark

on:
  pull_request:
    branches:
      - "**"
    paths:
      - "src/**/*.js"
      - "src/**/*.mjs"
      - "src/**/*.cjs"
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "rsrc/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/bench/**"
      - ".github/workflows/main.yml"
  workflow_dispatch:
    inputs:
      engines:
        description: 'Comma-separated engines to benchmark. Supported by this workflow default run: "http-native,bun,express"'
        required: false
        default: "http-native,bun,express"
      scenarios:
        description: 'Comma-separated scenarios: "static,dynamic,opt"'
        required: false
        default: "static,dynamic,opt"
      connections:
        description: "Bombardier concurrency"
        required: false
        default: "200"
      duration:
        description: "Bombardier duration"
        required: false
        default: "10s"
      timeout:
        description: "Bombardier timeout"
        required: false
        default: "2s"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ensure cc linker is available
        run: |
          if command -v cc >/dev/null 2>&1; then
            echo "cc already available: $(command -v cc)"
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      - name: Build Rust native module
        run: |
          cargo build --release
          echo "Rust native module built successfully"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Install bombardier
        run: |
          go install github.com/codesenberg/bombardier@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify tools
        run: |
          echo "--- Versions ---"
          bun --version
          node --version
          rustc --version
          bombardier --version || bombardier -v || echo "bombardier installed"
          echo "--- Ready ---"

      - name: Create output directories
        run: |
          mkdir -p .github/bench/results/bun
          mkdir -p .github/bench/results/node

      - name: Run benchmarks (http-native on Bun + selected engines)
        run: |
          bun .github/bench/ci.js \
            --engines="${{ inputs.engines || 'http-native,bun,express' }}" \
            --scenarios="${{ inputs.scenarios || 'static,dynamic,opt' }}" \
            --connections="${{ inputs.connections || '200' }}" \
            --duration="${{ inputs.duration || '10s' }}" \
            --timeout="${{ inputs.timeout || '2s' }}" \
            --http-native-runtime="bun" \
            --output-dir=".github/bench/results/bun"

      - name: Run benchmarks (http-native on Node)
        run: |
          bun .github/bench/ci.js \
            --engines="http-native" \
            --scenarios="${{ inputs.scenarios || 'static,dynamic,opt' }}" \
            --connections="${{ inputs.connections || '200' }}" \
            --duration="${{ inputs.duration || '10s' }}" \
            --timeout="${{ inputs.timeout || '2s' }}" \
            --http-native-runtime="node" \
            --output-dir=".github/bench/results/node"

      - name: Display results
        if: always()
        run: |
          echo "=== Bun Runtime Results ==="
          cat .github/bench/results/bun/summary.md 2>/dev/null || echo "No Bun results"
          echo ""
          echo "=== Node Runtime Results ==="
          cat .github/bench/results/node/summary.md 2>/dev/null || echo "No Node results"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            .github/bench/results/bun/results.json
            .github/bench/results/bun/summary.md
            .github/bench/results/node/results.json
            .github/bench/results/node/summary.md
          if-no-files-found: ignore
